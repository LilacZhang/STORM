Task: "JointTrainAgent"

BasicSettings:
  Seed: 0
  ImageSize: 64
  Device: "auto"  # Options: "auto", "mps", "cuda", "cpu" - auto will detect MPS on macOS
  UseAMP: null  # null (auto-detect), true, or false - MPS will disable AMP automatically
  ReplayBufferOnGPU: True  # Buffer will use the device specified above

JointTrainAgent:
  SampleMaxSteps: 200000  # Increased for MuJoCo environments
  BufferMaxLength: 100000
  BufferWarmUp: 1024
  NumEnvs: 1
  BatchSize: 16
  DemonstrationBatchSize: 0  # No demonstration for MuJoCo
  BatchLength: 64
  ImagineBatchSize: 512  # Reduced from 1024 for initial testing
  ImagineDemonstrationBatchSize: 0
  ImagineContextLength: 8
  ImagineBatchLength: 16
  TrainDynamicsEverySteps: 1
  TrainAgentEverySteps: 1
  UseDemonstration: False
  SaveEverySteps: 5000

Models:
  WorldModel:
    InChannels: 3
    TransformerMaxLength: 64
    TransformerHiddenDim: 512
    TransformerNumLayers: 2
    TransformerNumHeads: 8

  Agent:
    NumLayers: 2
    HiddenDim: 512
    Gamma: 0.99  # Adjusted for MuJoCo (typically 0.99)
    Lambda: 0.95
    EntropyCoef: 1E-3  # Increased entropy for exploration in MuJoCo
